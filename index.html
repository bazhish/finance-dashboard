<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Meu Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Controle Financeiro</h1>
</header>

<section id="resumo">
    <h2>Resumo</h2>

    <p>Salário total: <span id="salarioTotal">0</span></p>
    <p>Total gasto: <span id="gastoTotal">0</span></p>
    <p>Saldo restante: <span id="saldoRestante">0</span></p>
</section>

<section id="salario">
    <h2>Adicionar salário</h2>

    <input type="number" id="inputSalario" placeholder="Digite seu salário">
    <button id="btnSalvarSalario">Salvar salário</button>
</section>

<section id="gastos">
    <h2>Adicionar gasto</h2>

    <input type="text" id="nomeGasto" placeholder="Nome do gasto">

    <input type="number" id="valorGasto" placeholder="Valor">

    <select id="categoriaGasto">
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Estudos</option>
        <option>Lazer</option>
        <option>Outros</option>
    </select>

    <button id="btnAdicionarGasto">Adicionar</button>

</section>

<section>
    <h2>Lista de gastos</h2>
    <ul id="listaGastos"></ul>
</section>

<section>
    <h2>Distribuição de gastos</h2>
    <canvas id="graficoGastos"></canvas>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>
</html>
