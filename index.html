<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name = "description" content= "Ritmo financeiro é uma aplicação web que permite aos usuários
        gerenciar seu salário e seus gastos de forma eficiente. Com uma interface intuitiva, os usuários podem
        adicionar seu salário, registrar seus gastos diários e acompanhar o saldo restante. A aplicação
        também oferece uma visualização gráfica da distribuição dos gastos por categoria, 
        ajudando os usuários a entender melhor seus hábitos financeiros e tomar decisões 
        mais informadas para melhorar sua saúde financeira.">
    <meta name - keywords content = "controle financeiro, gerenciamento de gastos, orçamento pessoal, finanças pessoais, aplicação web">
    <link rel="stylesheet" href="style.css">
    <title>Controle Financeiro</title>
</head>
<body>

    <div class="container">

        <header class="header">
            <p id="TituloLogo"><span style="color: white;">Ritmo</span> <span style="color: #6ed86e;">Financeiro</span></p>
            <p id="TituloDescrição">Gerencie seu salário e seus gastos em um único lugar</p>
        </header>

        <section class="cards">
            <div class="card">
                <h3>Salário Total</h3>
                <p id="salarioTotal">R$ 0</p>
            </div>

            <div class="card">
                <h3>Total Gasto</h3>
                <p id="gastoTotal">R$ 0</p>
            </div>

            <div class="card">
                <h3>Saldo Restante</h3>
                <p id="saldoRestante">R$ 0</p>
            </div>
        </section>

        <section class="painel formulario">
            <h2>Adicionar salário</h2>
            <input type="number" id="inputSalario" placeholder="Digite seu salário">
            <button id="btnSalvarSalario">Salvar salário</button>
        </section>

        <section class="painel formulario">
            <h2>Adicionar gasto</h2>
            <input type="text" id="nomeGasto" placeholder="Nome do gasto">
            <input type="number" id="valorGasto" placeholder="Valor do gasto">

            <select id="categoriaGasto">
                <option>Alimentação</option>
                <option>Transporte</option>
                <option>Estudos</option>
                <option>Lazer</option>
                <option>Outros</option>
            </select>

            <button id="btnAdicionarGasto">Adicionar gasto</button>
        </section>

        <section class="painel lista">
            <h2>Lista de gastos</h2>
            <ul id="listaGastos"></ul>
        </section>

        <section class="painel grafico">
            <h2>Distribuição de gastos</h2>
            <canvas id="graficoGastos"></canvas>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
